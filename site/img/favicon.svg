<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Chip body -->
  <rect x="6" y="6" width="20" height="20" fill="#8B6914"/>
  <!-- Pin 1 dot -->
  <circle cx="11" cy="11" r="2" fill="#DAA520"/>
  <!-- Die outline -->
  <rect x="9" y="9" width="14" height="14" fill="none" stroke="#DAA520" stroke-width="0.75"/>
  <!-- Pins left -->
  <rect x="2" y="10" width="5" height="2" fill="#DAA520"/>
  <rect x="2" y="15" width="5" height="2" fill="#DAA520"/>
  <rect x="2" y="20" width="5" height="2" fill="#DAA520"/>
  <!-- Pins right -->
  <rect x="25" y="10" width="5" height="2" fill="#DAA520"/>
  <rect x="25" y="15" width="5" height="2" fill="#DAA520"/>
  <rect x="25" y="20" width="5" height="2" fill="#DAA520"/>
  <!-- Pins top -->
  <rect x="10" y="2" width="2" height="5" fill="#DAA520"/>
  <rect x="15" y="2" width="2" height="5" fill="#DAA520"/>
  <rect x="20" y="2" width="2" height="5" fill="#DAA520"/>
  <!-- Pins bottom -->
  <rect x="10" y="25" width="2" height="5" fill="#DAA520"/>
  <rect x="15" y="25" width="2" height="5" fill="#DAA520"/>
  <rect x="20" y="25" width="2" height="5" fill="#DAA520"/>
</svg>
