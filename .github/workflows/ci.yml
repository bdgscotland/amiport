name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TOOLCHAIN_IMAGE: ghcr.io/${{ github.repository }}/amiport-toolchain:latest

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (for vamos)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install amitools (vamos)
        run: pip install amitools

      - name: Try pulling cached toolchain image
        id: pull-cache
        continue-on-error: true
        run: docker pull $TOOLCHAIN_IMAGE

      - name: Build toolchain from Dockerfile (if no cache)
        if: steps.pull-cache.outcome == 'failure'
        run: |
          docker build -t $TOOLCHAIN_IMAGE -f toolchain/docker/Dockerfile.bebbo-gcc .

      - name: Build POSIX shim library
        run: make build-shim

      - name: Build POSIX emulation library
        run: make build-emu

      - name: Run shim tests
        run: make test-shim

      - name: Run emulation tests
        run: make test-emu

      - name: Check documentation consistency
        run: make check-docs

      - name: Build example ports
        run: |
          make build TARGET=examples/wc
          make build TARGET=examples/head
          make build TARGET=examples/mini-find

      - name: Test example ports
        run: |
          make test TARGET=examples/wc
          make test TARGET=examples/head
          make test TARGET=examples/mini-find

  push-toolchain-image:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image needs rebuilding
        id: check-rebuild
        run: |
          # Rebuild if Dockerfile changed in this push
          if git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -q 'toolchain/docker/Dockerfile'; then
            echo "rebuild=true" >> $GITHUB_OUTPUT
          else
            echo "rebuild=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push toolchain image
        if: steps.check-rebuild.outputs.rebuild == 'true'
        run: |
          docker build -t $TOOLCHAIN_IMAGE -f toolchain/docker/Dockerfile.bebbo-gcc .
          docker push $TOOLCHAIN_IMAGE
