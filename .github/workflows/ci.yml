name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (for vamos)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install amitools (vamos)
        run: |
          pip install machine68k greenlet
          pip install "git+https://github.com/cnvogelg/amitools.git"

      - name: Pull cross-compiler Docker image
        run: |
          # Try the smaller crosstools image first, fall back to full image
          docker pull amigadev/crosstools:m68k-amigaos ||
          docker pull amigadev/m68k-amigaos-gcc

      - name: Build POSIX shim library
        run: make build-shim

      - name: Build POSIX emulation library
        run: make build-emu

      - name: Run shim tests
        run: make test-shim

      - name: Run emulation tests
        continue-on-error: true  # pipe tests fail in vamos (no PIPE: device)
        run: make test-emu

      - name: Check documentation consistency
        run: make check-docs

      - name: Check agent/skill frontmatter
        run: make check-agents

      - name: Build console shim library
        run: make build-console

      - name: Build BSD socket shim library
        run: make build-net

      - name: Run console shim tests
        run: make test-console

      - name: Run BSD socket shim tests
        continue-on-error: true  # bsdsocket.library not available in vamos
        run: make test-net

      - name: Build example ports
        run: |
          make build TARGET=examples/wc
          make build TARGET=examples/head
          make build TARGET=examples/mini-find

      - name: Test example ports
        run: |
          make test TARGET=examples/wc
          make test TARGET=examples/head
          make test TARGET=examples/mini-find

      - name: Build production ports
        run: make build-ports

      - name: Test production ports (vamos)
        run: make test-ports

      - name: Check test coverage standard
        run: make check-test-coverage

      - name: Check port metadata consistency
        run: make check-port-metadata

      - name: Check fix propagation (informational)
        continue-on-error: true
        run: make check-fix-propagation
